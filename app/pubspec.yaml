name: walkie_talkie
description: WalkieTalkie - ESP32-C6 audio intercom
publish_to: 'none'
version: 1.0.3

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.35.0
  record: 6.2.0
  file_picker: ^8.0.0
  permission_handler: ^11.3.0
  opus_flutter: ^3.0.0
  audioplayers: ^6.0.0
  wifi_iot: ^0.3.19

dependency_overrides:
  package_info_plus: 8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
